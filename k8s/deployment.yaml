apiVersion: apps/v1
kind: Deployment
metadata:
  name: sipboquet-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sipboquet-app
  template:
    metadata:
      labels:
        app: sipboquet-app
    spec:
      containers:
        - name: sipboquet-app
          image: claw4321/sipbouquet:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sipboquet-secret
                  key: GEMINI_API_KEY

---
apiVersion: v1
kind: Service
metadata:
  name: sipboquet-service
spec:
  selector:
    app: sipboquet-app
  ports:
    - port: 80
      targetPort: 3000
  type: NodePort
